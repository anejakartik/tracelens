services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "${TRACELENS_PORT:-8000}:8000"
    environment:
      - TRACELENS_DB_URL=sqlite:////app/data/tracelens.db
      - TRACELENS_CORS_ORIGINS=${TRACELENS_CORS_ORIGINS:-*}
    volumes:
      - tracelens-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  tracelens-data:
